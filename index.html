<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Jollys - best game</title>
  <style>
    body { font-family: 'Arial', sans-serif; background: #fdfdfd; margin: 0; text-align: center; color: #333; overflow-x: hidden; }
    #header { width: 100%; height: 80px; background-color: #FFDA37; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; border-bottom: 5px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    #profileArea { padding: 30px; position: relative; }
    
    #pfp-container { 
      position: relative; 
      width: 120px; 
      height: 120px; 
      margin: 0 auto; 
      border-radius: 50%; 
      border: 6px solid #FFDA37; 
      background: white; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
      overflow: hidden; 
    }
    .pfp-layer { position: absolute; width: 100%; left: 0; top: 0; object-fit: cover; }
    .pfp-sket { z-index: 2; left: -5px; top: 10px; }
    .pfp-hat { z-index: 4; top: -15px; left: 15px; width: 80px; }
    .pfp-face {
      position: relative;
      top: -50px;
      right: -200px;
      z-index: 3; width: 30px; }

    #colinDisplay { background: #fff; border: 3px solid #333; display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-top: 10px; font-size: 18px; color: #b8860b; }
    #skinButton { position: relative; right: 100px; cursor: pointer; background: none; border: none; transition: 0.3s; vertical-align: middle; margin-left: 10px; width: 100px; height: 100px; }
    #skinButton:hover { transform: scale(1.1) rotate(5deg); }
    
    .game-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 20px; }
    .game-card { width: 140px; cursor: pointer; transition: 0.3s; position: relative; }
    .game-card:hover { transform: translateY(-8px); }
    .game-card img { width: 120px; height: 120px; border-radius: 20px; border: 4px solid #333; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.15); object-fit: cover; }
    .game-card p { font-weight: bold; font-size: 12px; margin-top: 10px; text-transform: uppercase; }
    .icon-placeholder { width: 120px; height: 120px; border-radius: 20px; border: 4px dashed #333; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
    .modal-content { padding: 40px 20px; width: 100%; box-sizing: border-box; min-height: 100%; position: relative; }
    .close-btn { position: fixed; top: 20px; right: 20px; cursor: pointer; background: #ff4444; color: white; border: 3px solid #333; border-radius: 50%; width: 45px; height: 45px; font-weight: bold; z-index: 3000; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    
    .btn-save { width: 100%; padding: 20px; background: #FFDA37; border: 4px solid #333; font-weight: bold; border-radius: 20px; cursor: pointer; margin-top: 20px; font-size: 18px; }
    .equipped-style { border: 6px solid #4CAF50 !important; background: #e8f5e9 !important; }

    #gameArea { background: #aeefff; height: 100%; }
    #soap { font-size: 150px; cursor: pointer; user-select: none; display: inline-block; margin: 40px 0; transition: 0.1s; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
    .stats-box { background: white; padding: 20px; border-radius: 25px; border: 4px solid #333; margin-bottom: 20px; font-size: 22px; font-weight: bold; }
    .btn-buy { background: #fff; border: 3px solid #333; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 15px; }

    #storebut { position: relative; width: 150px; height: 150px; bottom: 180px; left: 150px; cursor: pointer; }
    #dailybut { position: relative; width: 170px; height: 170px; bottom: -20px; left: -70px; cursor: pointer; }
    #TIMES { position: relative; bottom: 75px; background-color: white; padding: 5px; border-radius: 10px; display: inline-block; border: 2px solid #333; }

    #setting { position: absolute; top: 10px; left: 20px; cursor: pointer; font-size: 30px; }
    #setcon { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
    #space { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; object-fit: cover; display: none; }
    .space-active { background: #000 !important; color: #fff !important; }
    .delete-game-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 10; font-weight: bold; }
    
    .char-preview { position: relative; width: 200px; height: 200px; margin: 0 auto 30px; }
    .layer { position: absolute; width: 100%; left: 0; top: 0; pointer-events: none; }
    .layer-jacket { z-index: 2; left: -10px; top: 20px; }
    .pfp-layer { position: absolute; width: 100%; left: 0; top: 0; object-fit: cover; }
.pfp-sket { z-index: 2; left: -5px; top: 10px; } /* Jaket/Baju */
.pfp-face { z-index: 3; position: relative; width: 40px;
top: 25px;
left: 40px;
} /* WAJAH (Sekarang di bawah topi) */
.pfp-hat  { z-index: 4; top: -15px; left: 15px; width: 80px; } /* TOPI (Paling depan) */

/* CSS untuk Modal Customizer juga perlu disesuaikan */
.layer-face { z-index: 3; position: relative; width: 80px;
top: 30px;
}
.layer-hat { z-index: 4; top: -30px; left: 30px; width: 130px;
    
    #creatorModal .modal-content { max-width: 600px; margin: 0 auto; padding: 30px 25px; background: linear-gradient(145deg, #ffffff 0%, #f5f5f5 100%); border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    #creatorModal h2 { font-size: 32px; color: #333; text-align: center; margin-bottom: 30px; text-shadow: 3px 3px 0 #FFDA37; letter-spacing: 2px; position: relative; }
    #creatorModal label { display: block; font-weight: bold; font-size: 16px; color: #333; margin: 20px 0 8px 5px; text-transform: uppercase; letter-spacing: 1px; }
    #customGameName, #customGameCode { width: 100%; padding: 15px 20px; border: 4px solid #333; border-radius: 20px; font-size: 16px; background: white; box-sizing: border-box; }
    #customGameCode { min-height: 200px; font-family: 'Courier New', monospace; background: #1e1e1e; color: #fff; border-color: #FFDA37; }
    #creatorModal input[type="file"] { width: 100%; padding: 15px; background: white; border: 4px dashed #333; border-radius: 20px; cursor: pointer; margin: 10px 0 5px; box-sizing: border-box; }
    
    .wash-shop { background: white; border: 4px solid #333; border-radius: 25px; padding: 20px; margin-top: 30px; }
    .shop-item { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; padding: 10px; background: #f5f5f5; border-radius: 15px; border: 2px solid #333; }
    
    
  </style>
</head>

<body id="body">
  <div id="setcon">
    <h2>SETTINGS</h2>
    <button type="button" id="spacon" class="btn-save" style="width: 250px;">TOGGLE SPACE MODE</button>
    <button type="button" class="btn-save" style="width: 250px; background: #ff4444;" onclick="document.getElementById('setcon').style.display='none'">CLOSE</button>
  </div>

  <img src="space.png" id="space" />
  <div id="header">JOLLYS</div>
  <div id="setting">⚙️</div>

  <div id="profileArea">
    <div id="pfp-container">
        <img src="basebody.png" class="pfp-layer" style="z-index: 1;">
        <img src="" id="main-pfp-face" class="pfp-layer pfp-face" style="display: none;">
        <img src="jollysket.png" id="main-pfp-sket" class="pfp-layer pfp-sket" style="display: none;">
        <img src="builderhat.png" id="main-pfp-hat" class="pfp-layer pfp-hat" style="display: none;">
    </div>
    <h2>USER</h2>
    <div id="colinDisplay">🪙 <span id="mainColinCount">0</span> Colin</div>
    <br>
    <img src="customise.jpg" id="skinButton" onclick="openSkinModal()">
  </div>

  <img src="store.png" id="storebut">
  <img src="dailyr.png" id="dailybut">
  <h2 id="TIMES">READY!</h2>

  <div class="game-container" id="mainContainer">
    <div class="game-card" onclick="window.location.href='https://solololo834.github.io/JOLLYS-Meowl-slayer/'"><img src="game1.jpg"><p>MEOWL SLAYER</p></div>
    <div class="game-card" onclick="openWashGame()"><img src="game2.png"><p>WASH TO EAT</p></div>
    <div class="game-card" onclick="openMixGuy()"><img src="game3.png"><p>MIX GUY</p></div>
    <div class="game-card" onclick="openCreator()"><div class="icon-placeholder">＋</div><p>CREATE GAME</p></div>
  </div>

  <div id="storeModal" class="modal-overlay">
    <button class="close-btn" onclick="closeModals()">✕</button>
    <div class="modal-content">
       <h1>iJollyShop</h1>
       <h2>________________________________</h2>
       <div class="game-container">
         <div class="game-card"><img src="builderhat.png"><button class="btn-buy" onclick="buySkin('builderhat', 50)">BUY BUILDERHAT (50)</button></div>
         <div class="game-card"><img src="jollysket.png"><button class="btn-buy" style="background:lightblue" onclick="buySkin('jollysket', 100)">BUY JOLLYSKET (100)</button></div>
         <div class="game-card"><img src="chewing.png"><button class="btn-buy" onclick="buySkin('chewing', 150)">BUY CHEWING (150)</button></div>
         <div class="game-card"><img src="p.png"><button class="btn-buy" onclick="buySkin('p', 150)">BUY :P (150)</button></div>
         <div class="game-card"><img src="smile.png"><button class="btn-buy" onclick="buySkin('smile', 150)">BUY ^_^ (150)
         </button>
         <h4>(get colin in mixguy)</h4>
</div>
       </div>
    </div>
  </div>

  <div id="skinModal" class="modal-overlay">
    <button class="close-btn" onclick="closeModals()">✕</button>
    <div class="modal-content">
      <h2>CHARACTER CUSTOMIZER</h2>
      <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button onclick="renderSkins('skins')" class="btn-buy" style="flex:1">SKINS</button>
        <button onclick="renderSkins('custom')" class="btn-buy" style="flex:1">CUSTOM</button>
      </div>
      <div id="skinContent"></div>
    </div>
  </div>

  <div id="gameModal" class="modal-overlay">
    <button class="close-btn" onclick="closeModals()">✕</button>
    <div class="modal-content" id="gameArea">
      <div class="stats-box">Clean: <span id="percentDisp">0%</span></div>
      <div id="soap">🧼</div>
      <div class="wash-shop">
        <h3>🛒 SHOP</h3>
        <div class="shop-item"><span>🧼 Small Soap (+1/s)</span><button class="btn-buy" onclick="buyItem('small', 20, 1)">BUY (20)</button></div>
        <div class="shop-item"><span>🧴 Big Soap (+5/s)</span><button class="btn-buy" onclick="buyItem('big', 80, 5)">BUY (80)</button></div>
        <div class="shop-item"><span>✨ Magic Scrub (+25/s)</span><button class="btn-buy" onclick="buyItem('magic', 300, 25)">BUY (300)</button></div>
      </div>
    </div>
  </div>

  <div id="creatorModal" class="modal-overlay">
    <button class="close-btn" onclick="closeModals()">✕</button>
    <div class="modal-content">
      <h2>⚒️ GAME CREATOR</h2>
      <input type="text" id="customGameName" placeholder="Game Name">
      <label>Icon:</label><input type="file" id="customGameIcon" accept="image/*">
      <textarea id="customGameCode" placeholder="Paste HTML code here..."></textarea>
      <button class="btn-save" onclick="saveNewGame()">💾 SAVE GAME</button>
    </div>
  </div>

  <div id="playCustomModal" class="modal-overlay">
    <button class="close-btn" onclick="closeModals()">✕</button>
    <iframe id="gameRunner" style="width: 100%; height: 100%; border: none;"></iframe>
  </div>

  <script>
    let isHolding = false;
    let cleanProgress = parseInt(localStorage.getItem('washProgress') || '0');
    let money = parseInt(localStorage.getItem('washMoney') || '0');
    let basePower = parseInt(localStorage.getItem('washPower') || '1');
    let currentPower = basePower;

    function updateMainColin() { 
      document.getElementById('mainColinCount').innerText = localStorage.getItem('mixGuyColin') || '0'; 
    }
    
    function updatePFP() {
      const useHat = localStorage.getItem('use_builderhat') === 'true';
      const useSket = localStorage.getItem('use_jollysket') === 'true';
      const useDoodle = localStorage.getItem('use_doodle') === 'true';
      const activeFace = localStorage.getItem('active_face') || '';

      document.getElementById('main-pfp-hat').style.display = useHat ? 'block' : 'none';
      document.getElementById('main-pfp-sket').style.display = useSket ? 'block' : 'none';
      
      const faceEl = document.getElementById('main-pfp-face');
      if(activeFace) {
        faceEl.src = activeFace + ".png";
        faceEl.style.display = "block";
      } else {
        faceEl.style.display = "none";
      }

      const baseBodyImg = document.querySelector('#pfp-container img[style*="z-index: 1"]');
      baseBodyImg.src = useDoodle ? "doodle.png" : "basebody.png";
    }

    function buySkin(id, price) {
      let bal = parseInt(localStorage.getItem('mixGuyColin') || '0');
      if (localStorage.getItem('unlocked_'+id) === 'true') return alert("Already owned!");
      if (bal >= price) {
        localStorage.setItem('mixGuyColin', bal - price);
        localStorage.setItem('unlocked_'+id, 'true');
        updateMainColin(); alert("✅ Success!");
      } else alert("❌ Need more Colin!");
    }

    function toggleEquip(id) {
  // LOGIKA TOMBOL DEFAULT
  if (id === 'default') {
    localStorage.setItem('use_builderhat', 'false');
    localStorage.setItem('use_jollysket', 'false');
    localStorage.setItem('use_doodle', 'false'); // Reset ke basebody
    localStorage.setItem('active_face', '');      // Hapus wajah
    
    renderSkins('custom');
    updatePFP();
    return; // Keluar dari fungsi
  }

  // LOGIKA UNTUK FACE (p, smile, chewing)
  if(['chewing', 'p', 'smile'].includes(id)) {
    let current = localStorage.getItem('active_face');
    // Jika klik wajah yang sama, lepas (toggle off), jika beda, ganti.
    localStorage.setItem('active_face', current === id ? '' : id);
  } 
  
  // LOGIKA UNTUK DOODLE SKIN
  else if (id === 'doodle') {
    let isEquipped = localStorage.getItem('use_doodle') === 'true';
    localStorage.setItem('use_doodle', !isEquipped);
  }
  
  // LOGIKA UNTUK ITEM LAIN (Hat, Sket)
  else {
    let isEquipped = localStorage.getItem('use_' + id) === 'true';
    localStorage.setItem('use_' + id, !isEquipped);
  }

  // Refresh tampilan
  renderSkins(id === 'doodle' ? 'skins' : 'custom');
  updatePFP();
}


    function renderSkins(tabType) {
      const content = document.getElementById('skinContent');
      content.innerHTML = ''; 
      if (tabType === 'skins') {
        if (localStorage.getItem('doodleSkin') === 'true') {
          const useDoodle = localStorage.getItem('use_doodle') === 'true';
          content.innerHTML = `
            <div class="game-card ${useDoodle ? 'equipped-style' : ''}" onclick="toggleEquip('doodle')">
              <img src="doodle.png"><p>DOODLE SKIN</p><small>${useDoodle ? 'EQUIPPED' : 'CLICK TO EQUIP'}</small>
            </div>`;
        } else {
          let prog = localStorage.getItem('washProgress') || "0";
          content.innerHTML = `<h3>❌ No Skins unlocked</h3><p>Reach 100k% on wash to eat to get doodleSkin 🤐<br>Current: ${parseInt(prog).toLocaleString()}%</p>`;
        }
      } else if (tabType === 'custom') {
        const useHat = localStorage.getItem('use_builderhat') === 'true';
        const useSket = localStorage.getItem('use_jollysket') === 'true';
        const useDoodle = localStorage.getItem('use_doodle') === 'true';
        const activeFace = localStorage.getItem('active_face') || '';

        let faceHTML = activeFace ? `<img src="${activeFace}.png" class="layer layer-face">` : '';

        content.innerHTML = `
          <div class="char-preview">
            <img src="${useDoodle ? 'doodle.png' : 'basebody.png'}" class="layer" style="z-index:1">
            ${faceHTML}
            <img src="jollysket.png" class="layer layer-jacket" style="display: ${useSket ? 'block' : 'none'};">
            <img src="builderhat.png" class="layer layer-hat" style="display: ${useHat ? 'block' : 'none'};">
          </div><hr>
          <div class="game-container">
            <div class="game-card" onclick="toggleEquip('default')"><img src="default.png"><p>Default</p></div>
            ${localStorage.getItem('unlocked_builderhat') === 'true' ? `<div class="game-card ${useHat ? 'equipped-style' : ''}" onclick="toggleEquip('builderhat')"><img src="builderhat.png"><p>Hat</p></div>` : ''}
            ${localStorage.getItem('unlocked_jollysket') === 'true' ? `<div class="game-card ${useSket ? 'equipped-style' : ''}" onclick="toggleEquip('jollysket')"><img src="jollysket.png"><p>Jollysket</p></div>` : ''}
            ${localStorage.getItem('unlocked_chewing') === 'true' ? `<div class="game-card ${activeFace === 'chewing' ? 'equipped-style' : ''}" onclick="toggleEquip('chewing')"><img src="chewing.png"><p>Chewing</p></div>` : ''}
            ${localStorage.getItem('unlocked_p') === 'true' ? `<div class="game-card ${activeFace === 'p' ? 'equipped-style' : ''}" onclick="toggleEquip('p')"><img src="p.png"><p>:P</p></div>` : ''}
            ${localStorage.getItem('unlocked_smile') === 'true' ? `<div class="game-card ${activeFace === 'smile' ? 'equipped-style' : ''}" onclick="toggleEquip('smile')"><img src="smile.png"><p>^_^</p></div>` : ''}
          </div>`;
      }
    }

    // --- (Fungsi Wash To Eat, Mix Guy, & System tetap sama) ---
    function openWashGame() {
      cleanProgress = parseInt(localStorage.getItem('washProgress') || '0');
      money = parseInt(localStorage.getItem('washMoney') || '0');
      basePower = parseInt(localStorage.getItem('washPower') || '1');
      currentPower = basePower;
      document.getElementById('percentDisp').innerText = cleanProgress.toLocaleString() + "%";
      let mDisp = document.getElementById('moneyDispFixed') || document.createElement('div');
      mDisp.id = 'moneyDispFixed';
      mDisp.style = 'position:fixed; top:20px; right:80px; background:#FFDA37; border:3px solid #333; border-radius:20px; padding:10px 20px; font-weight:bold; z-index:9999;';
      document.body.appendChild(mDisp);
      mDisp.innerText = "💰 " + money; mDisp.style.display = 'block';
      document.getElementById('gameModal').style.display = 'flex';
    }

    function buyItem(type, cost, power) {
      if (money >= cost) {
        money -= cost; basePower += power; currentPower = basePower;
        localStorage.setItem('washMoney', money); localStorage.setItem('washPower', basePower);
        document.getElementById('moneyDispFixed').innerText = "💰 " + money;
      } else alert("❌ Not enough money!");
    }

    const soapEl = document.getElementById('soap');
    soapEl.onmousedown = soapEl.ontouchstart = (e) => { e.preventDefault(); isHolding = true; };
    window.onmouseup = window.ontouchend = () => { isHolding = false; };

    setInterval(() => {
      if (document.getElementById('gameModal').style.display === 'flex' && isHolding && cleanProgress < 100000) {
        cleanProgress += currentPower;
        if (cleanProgress > 100000) cleanProgress = 100000;
        document.getElementById('percentDisp').innerText = cleanProgress.toLocaleString() + "%";
        localStorage.setItem('washProgress', cleanProgress);
        if (cleanProgress >= 100000 && localStorage.getItem('doodleSkin') !== 'true') {
          localStorage.setItem('doodleSkin', 'true'); alert("🎉 DOODLE SKIN UNLOCKED!");
        }
      }
    }, 50);

    setInterval(() => {
      if (document.getElementById('gameModal').style.display === 'flex') {
        money += currentPower * 2; localStorage.setItem('washMoney', money);
        if(document.getElementById('moneyDispFixed')) document.getElementById('moneyDispFixed').innerText = "💰 " + money;
      }
    }, 1000);

    function openSkinModal() { document.getElementById('skinModal').style.display = 'flex'; renderSkins('custom'); }
    function openCreator() { document.getElementById('creatorModal').style.display = 'flex'; }
    function closeModals() {
      document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
      document.getElementById('gameRunner').src = "about:blank";
      if (document.getElementById('moneyDispFixed')) document.getElementById('moneyDispFixed').style.display = 'none';
      updateMainColin();
    }

    document.getElementById('setting').onclick = () => document.getElementById('setcon').style.display='flex';
    document.getElementById('spacon').onclick = () => {
      let s = document.getElementById("space");
      s.style.display = (s.style.display === "block") ? "none" : "block";
      document.body.classList.toggle("space-active");
      document.getElementById("header").style.background = "linear-gradient(135deg, #E262BC, #003DD8)";
    };

   
function openMixGuy() {
  const mixGuyCode = `<!DOCTYPE html>

        .pickup-btn:active { transform: translateY(3px); box-shadow: none; }

        /* BOTTOM CENTER: Compact Inventory */
        .inventory-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999; }
        .inventory { background: rgba(47, 84, 47, 0.9); padding: 6px; display: flex; gap: 6px; border: 2px solid #ebc76e; border-radius: 12px; }
        .slot { width: 45px; height: 45px; background: #352b18; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border-radius: 8px; border: 1px solid #5d4a2a; }

        /* BOTTOM RIGHT: Controls */
        .controls { position: fixed; bottom: 20px; right: 20px; display: grid; grid-template-columns: repeat(3, 50px); gap: 5px; z-index: 1000; }
        .ctrl { width: 50px; height: 50px; background: rgba(231, 197, 139, 0.9); border: 1px solid #8f6a2b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; box-shadow: 0 3px #8f6a2b; }
        
        .item { position: absolute; font-size: 2rem; transform: translate(-50%, -50%); }
        .tree { position: absolute; font-size: 4rem; opacity: 0.6; pointer-events: none; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="world"><div id="trees"></div><div id="items"></div></div>
    
    <img src="scb.png" id="player-sprite" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=MixGuy'">

    <div class="top-bar">
        <button class="top-btn btn-recipe" onclick="showRecipes()">RECIPES📔</button>
        <button class="top-btn btn-clear" onclick="resetInventory()">CLEAR🗑️</button>
        <button class="top-btn btn-mix" onclick="craft()">MIX🌀</button>
    </div>

    <div class="score-board" id="score">🪙 0</div>

    <div class="pickup-container">
        <button class="pickup-btn" onclick="pickup()">✋<br>PICKUP</button>
    </div>

    <div class="inventory-container">
        <div class="inventory">
            <div class="slot">⚫</div><div class="slot">⚫</div><div class="slot">⚫</div><div class="slot">⚫</div>
        </div>
    </div>

    <div class="controls">
        <div style="grid-column:2" class="ctrl" onclick="move(0,-80)">↑</div>
        <div style="grid-column:1" class="ctrl" onclick="move(-80,0)">←</div>
        <div style="grid-column:2" class="ctrl" onclick="move(0,80)">↓</div>
        <div style="grid-column:3" class="ctrl" onclick="move(80,0)">→</div>
    </div>

    <script>
        const player = { x: 1000, y: 1000 };
        let inventory = [null, null, null, null];
        let colinBalance = parseInt(localStorage.getItem('mixGuyColin') || '0');
        const rawItems = ['🍌', '🍎', '🥚', '🍯', '🔥', '💧', '🐟', '🧂'];
        let activeItems = [];
        const recipes = {
            '🍎🍯': { res: '🍏', val: 15 }, '🥚🔥': { res: '🍳', val: 10 },
            '🍌💧': { res: '🥤', val: 12 }, '🐟🔥': { res: '🍗', val: 20 },
            '🐟🧂': { res: '🍱', val: 25 }, '🍎🔥': { res: '🥧', val: 18 },
            '🥚💧': { res: '🍜', val: 22 }, '🍯💧': { res: '🍺', val: 15 }, '🧂💧': { res: '🌊', val: 5 }
        };

        function init() {
            document.getElementById('score').innerText = "🪙 " + colinBalance;
            const treeDiv = document.getElementById('trees');
            for(let i=0; i<35; i++) {
                const t = document.createElement('div'); t.className = 'tree'; t.innerText = '🌳';
                t.style.left = (Math.random() * 1900 + 50) + 'px'; t.style.top = (Math.random() * 1900 + 50) + 'px';
                treeDiv.appendChild(t);
            }
            spawnItems(25); updateCamera(); updateInventoryUI();
        }

        function spawnItems(count) {
            for(let i=0; i<count; i++) {
                activeItems.push({ emoji: rawItems[Math.floor(Math.random() * rawItems.length)], x: Math.random() * 1800 + 100, y: Math.random() * 1800 + 100, collected: false });
            }
            renderWorldItems();
        }

        function renderWorldItems() {
            const container = document.getElementById('items'); container.innerHTML = '';
            activeItems.forEach(item => {
                if(!item.collected) {
                    const d = document.createElement('div'); d.className = 'item'; d.innerText = item.emoji;
                    d.style.left = item.x + 'px'; d.style.top = item.y + 'px';
                    container.appendChild(d);
                }
            });
        }

        window.move = function(dx, dy) {
            player.x = Math.max(50, Math.min(1950, player.x + dx));
            player.y = Math.max(50, Math.min(1950, player.y + dy));
            updateCamera();
        };

        function updateCamera() {
            const ox = (window.innerWidth / 2) - player.x;
            const oy = (window.innerHeight / 2) - player.y;
            document.getElementById('world').style.transform = "translate(" + ox + "px," + oy + "px)";
        }

        window.pickup = function() {
            let found = false;
            activeItems.forEach(item => {
                if(!item.collected && Math.hypot(player.x - item.x, player.y - item.y) < 70) {
                    const emptyIdx = inventory.indexOf(null);
                    if(emptyIdx !== -1 && !found) {
                        inventory[emptyIdx] = item.emoji;
                        item.collected = true;
                        found = true;
                    }
                }
            });
            if(found) { updateInventoryUI(); renderWorldItems(); if(activeItems.filter(i => !i.collected).length < 8) spawnItems(10); }
        };

        window.craft = function() {
            const held = inventory.filter(i => i !== null);
            if(held.length < 2) { alert("Grab 2 items first!"); return; }
            const a = held[0], b = held[1];
            const res = recipes[a+b] || recipes[b+a];
            if(res) {
                let rem = 0;
                for(let i=0; i<inventory.length; i++){ if((inventory[i]===a||inventory[i]===b)&&rem<2){inventory[i]=null; rem++;} }
                inventory[inventory.indexOf(null)] = res.res;
                colinBalance += res.val;
                localStorage.setItem('mixGuyColin', colinBalance);
                document.getElementById('score').innerText = "🪙 " + colinBalance;
                alert("Success: " + res.res);
            } else { alert("Mixing failed!"); }
            updateInventoryUI();
        };

        function updateInventoryUI() {
            const filt = inventory.filter(i => i !== null);
            inventory = [null, null, null, null];
            filt.forEach((item, i) => { if(i < 4) inventory[i] = item; });
            const slots = document.querySelectorAll('.slot');
            inventory.forEach((item, i) => { slots[i].innerText = item || '⚫'; });
        }

        window.resetInventory = function() { inventory = [null, null, null, null]; updateInventoryUI(); };
        window.showRecipes = function() {
            let l = "📜 RECIPES:\\n";
            for(let k in recipes) l += k + " = " + recipes[k].res + "\\n";
            alert(l);
        };
        init();
    <\/script>
</body>
</html>`;

        
  
  document.getElementById('playCustomModal').style.display = 'flex';
  var runner = document.getElementById('gameRunner');
  var doc = runner.contentWindow.document;
  doc.open();
  doc.write(mixGuyCode);
  doc.close();
}
    

    window.saveNewGame = () => {
      const name = document.getElementById('customGameName').value, 
            code = document.getElementById('customGameCode').value, 
            file = document.getElementById('customGameIcon').files[0];
      if (!name || !code || !file) return alert("Fill all!");
      const reader = new FileReader();
      reader.onload = (e) => {
        let games = JSON.parse(localStorage.getItem('myCustomGames') || '[]');
        games.push({ id: Date.now(), name, code, icon: e.target.result });
        localStorage.setItem('myCustomGames', JSON.stringify(games));
        location.reload();
      };
      reader.readAsDataURL(file);
    };

    window.deleteGame = (id) => { 
      if (confirm("Delete?")) { 
        let games = JSON.parse(localStorage.getItem('myCustomGames') || '[]'); 
        localStorage.setItem('myCustomGames', JSON.stringify(games.filter(g => g.id !== id))); 
        location.reload(); 
      } 
    };

    const COOLDOWN = 24 * 60 * 60 * 1000;
    setInterval(() => {
      const last = localStorage.getItem('lastDailyClaim');
      const display = document.getElementById('TIMES');
      if (!last) return display.innerText = "READY!";
      const left = (parseInt(last) + COOLDOWN) - Date.now();
      if (left <= 0) display.innerText = "READY!";
      else {
        const h = Math.floor(left / 3600000), m = Math.floor((left % 3600000) / 60000), s = Math.floor((left % 60000) / 1000);
        display.innerText = `${h}h ${m}m ${s}s`;
      }
    }, 1000);

    document.getElementById('dailybut').onclick = () => {
      const last = localStorage.getItem('lastDailyClaim');
      if (!last || Date.now() > (parseInt(last) + COOLDOWN)) {
        localStorage.setItem('mixGuyColin', parseInt(localStorage.getItem('mixGuyColin') || '0') + 300);
        localStorage.setItem('lastDailyClaim', Date.now());
        updateMainColin(); alert("🎁 +300 Colin!");
      } else alert("Wait!");
    };

    window.onload = () => {
      updateMainColin();
      updatePFP();
      const games = JSON.parse(localStorage.getItem('myCustomGames') || '[]');
      games.forEach(g => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `<img src="${g.icon}"><p>${g.name}</p><button class="delete-game-btn" onclick="event.stopPropagation(); deleteGame(${g.id})">✕</button>`;
        card.onclick = () => { 
          document.getElementById('playCustomModal').style.display = 'flex'; 
          document.getElementById('gameRunner').srcdoc = g.code;
        };
        document.getElementById('mainContainer').appendChild(card);
      });
    };
    document.getElementById('storebut').onclick = () => document.getElementById('storeModal').style.display = 'flex';
  </script>
</body>
</html>
